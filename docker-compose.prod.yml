version: "3.9"

# Production stack — baked images, no bind mounts or dev hot reload.
# Usage: docker compose -f docker-compose.prod.yml up --build

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mrb_learning}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
    volumes:
      - mrb_mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 25s

  backend:
    build: ./server
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: client/Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-4173}:4173"
    environment:
      NODE_ENV: production
      VITE_API_PROXY_TARGET: http://backend:4000
    depends_on:
      - backend

volumes:
  mrb_mysql_data:
