# Rate limit zones — include once in nginx.conf http { } block
limit_req_zone $binary_remote_addr zone=mrb_api_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=mrb_api_auth:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=mrb_webhook:10m rate=60r/s;
limit_conn_zone $binary_remote_addr zone=mrb_conn:10m;
